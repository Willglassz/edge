<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Sender Background Script</title>
</head>
<body>
    <script>
        window.addEventListener('message', async (event) => {
            const data = event.data;
            if (data && data.action === 'send_whatsapp_message') {
                const phoneNumber = data.phone_number;
                const messageText = data.message_text;
                const webhookUrl = 'https://my-n8n-server.com/webhook/send-wa';

                try {
                    const response = await fetch(webhookUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            phone_number: phoneNumber,
                            message_text: messageText
                        })
                    });

                    if (response.ok) {
                        window.parent.postMessage({
                            status: 'success',
                            message: `Mesaj başarıyla ${phoneNumber} numarasına gönderildi.`
                        }, '*');
                    } else {
                        window.parent.postMessage({
                            status: 'error',
                            message: `Webhook hatası: ${response.statusText}`
                        }, '*');
                    }
                } catch (error) {
                    window.parent.postMessage({
                        status: 'error',
                        message: `Gönderim sırasında bir hata oluştu: ${error.message}`
                    }, '*');
                }
            }
        });
        window.parent.postMessage({ status: 'ready' }, '*');
    </script>
</body>
</html>
