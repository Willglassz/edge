<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Native Sender</title>
</head>
<body>
    <script>
        /**
         * Android Intent kullanarak ücretsiz gönderim yöntemi.
         * Bu yöntem cihazdaki WhatsApp uygulamasını tetikler.
         */
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (data && data.action === 'send_whatsapp_message') {
                const phoneNumber = data.phone_number.replace(/\D/g, ''); // Sadece rakamlar
                const messageText = encodeURIComponent(data.message_text);
                
                // Android WhatsApp Intent URL
                const intentUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${messageText}`;

                try {
                    // WhatsApp'ı tetikle
                    window.location.href = intentUrl;

                    // Başarılı olduğunu bildir (WhatsApp açılmış olmalı)
                    window.parent.postMessage({
                        status: 'success',
                        message: 'WhatsApp uygulaması tetiklendi. Lütfen gönder butonuna basın.'
                    }, '*');
                } catch (error) {
                    window.parent.postMessage({
                        status: 'error',
                        message: `Hata: ${error.message}`
                    }, '*');
                }
            }
        });

        window.parent.postMessage({ status: 'ready' }, '*');
    </script>
</body>
</html>
